name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS runner: folder-server is macOS-only and targets the system bash 3.2,
    # so this is the faithful environment to catch regressions.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats + shellcheck
        run: brew install bats-core shellcheck

      - name: shellcheck
        run: shellcheck -x bin/folder-server lib/*.sh install.sh fix.sh uninstall.sh

      - name: bats
        run: bats test/
